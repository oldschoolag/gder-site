      <text x="114" y="98" fill="#141715" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="600" letter-spacing="-1">Check against the canonical record</text>
      <text x="34" y="160" fill="#5C645B" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="500">A relying party should be able to test whether the shared extract still resolves to the current public record.</text>
