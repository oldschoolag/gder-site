<svg width="1280" height="760" viewBox="0 0 1280 760" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="GDER record, extract, and verify visual system overview">
  <defs>
    <linearGradient id="panelbg" x1="120" y1="80" x2="1160" y2="680" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FBF9F3"/>
      <stop offset="1" stop-color="#EEE7DA"/>
    </linearGradient>
    <filter id="soft" x="0" y="0" width="1280" height="760" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="28" stdDeviation="28" flood-color="#1A1D1C" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect x="40" y="40" width="1200" height="680" rx="44" fill="url(#panelbg)" stroke="#DED5C7"/>
  <g opacity="0.35">
