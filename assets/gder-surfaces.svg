      <text x="34" y="56" fill="#667066" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700" letter-spacing="1.7">01 · RECORD</text>
      <text x="34" y="112" fill="#141715" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="600" letter-spacing="-1">Canonical public record</text>
      <line x1="34" y1="144" x2="256" y2="144" stroke="#E6DDCF"/>
      <text x="34" y="196" fill="#667066" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="700" letter-spacing="1.5">LEGAL WRAPPER</text>
      <text x="34" y="226" fill="#141715" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="600">Foundation</text>
      <text x="34" y="276" fill="#667066" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="700" letter-spacing="1.5">GOVERNANCE ANCHOR</text>
      <text x="34" y="306" fill="#141715" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="600">Board + charter</text>
      <text x="34" y="356" fill="#667066" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="700" letter-spacing="1.5">STATUS</text>
