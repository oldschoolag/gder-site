    </g>

    <g transform="translate(494 170)">
      <rect width="292" height="300" rx="34" fill="#FFFDFC" stroke="#DCCFBC"/>
      <text x="34" y="56" fill="#667066" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700" letter-spacing="1.7">02 · EXTRACT</text>
      <text x="34" y="112" fill="#141715" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="600" letter-spacing="-1">Portable relying copy</text>
      <line x1="34" y1="144" x2="256" y2="144" stroke="#E6DDCF"/>
      <text x="34" y="198" fill="#667066" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="700" letter-spacing="1.5">ISSUED</text>
      <text x="258" y="198" text-anchor="end" fill="#141715" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="600">17 Apr 2026</text>
      <text x="34" y="244" fill="#667066" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="700" letter-spacing="1.5">DIGEST</text>
      <text x="258" y="244" text-anchor="end" fill="#141715" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="600">9F32 • 18AE</text>
