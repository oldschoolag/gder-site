  <text x="280" y="190" fill="#141715" font-family="DejaVu Sans, Arial, sans-serif" font-size="46" font-weight="700">A public record system</text>
  <text x="280" y="246" fill="#141715" font-family="DejaVu Sans, Arial, sans-serif" font-size="46" font-weight="700">for governed digital</text>
  <text x="280" y="302" fill="#141715" font-family="DejaVu Sans, Arial, sans-serif" font-size="46" font-weight="700">entities.</text>

  <text x="280" y="338" fill="#5E665D" font-family="DejaVu Sans, Arial, sans-serif" font-size="20">Counterparties-first public inspection surface.</text>
  <text x="280" y="370" fill="#5E665D" font-family="DejaVu Sans, Arial, sans-serif" font-size="20">Documented wrappers, governance, operating control.</text>

