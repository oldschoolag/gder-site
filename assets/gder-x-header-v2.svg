  <text x="184" y="138" fill="#6A7068" font-family="DejaVu Sans, Arial, sans-serif" font-size="10" font-weight="700">AN OLD SCHOOL PRODUCT</text>

  <text x="86" y="226" fill="#141715" font-family="DejaVu Sans, Arial, sans-serif" font-size="54" font-weight="700">A public record system</text>
  <text x="86" y="289" fill="#141715" font-family="DejaVu Sans, Arial, sans-serif" font-size="54" font-weight="700">for governed digital entities.</text>
  <text x="88" y="349" fill="#5E665D" font-family="DejaVu Sans, Arial, sans-serif" font-size="22">Counterparties-first. Evidence-led. Public inspection surface.</text>
  <text x="88" y="384" fill="#5E665D" font-family="DejaVu Sans, Arial, sans-serif" font-size="22">Documented wrappers, governance, operating control.</text>

  <rect x="985" y="64" width="392" height="372" rx="30" fill="#FBF8F1" stroke="#DCCFBC"/>
  <text x="1018" y="89" fill="#667066" font-family="DejaVu Sans, Arial, sans-serif" font-size="13" font-weight="700">PUBLIC RECORD SURFACE</text>
