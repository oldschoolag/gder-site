  <text x="1018" y="167" fill="#141715" font-family="DejaVu Sans, Arial, sans-serif" font-size="30" font-weight="700">Entity Record</text>
  <text x="1018" y="193" fill="#687067" font-family="DejaVu Sans, Arial, sans-serif" font-size="14">Research-set-led public inspection view</text>
  <line x1="1018" y1="208" x2="1338" y2="208" stroke="#E7DED0"/>

  <text x="1018" y="238" fill="#141715" font-family="DejaVu Sans, Arial, sans-serif" font-size="17" font-weight="700">WRAPPER</text>
  <text x="1160" y="238" fill="#5E665D" font-family="DejaVu Sans, Arial, sans-serif" font-size="17">Documented</text>
  <text x="1018" y="284" fill="#141715" font-family="DejaVu Sans, Arial, sans-serif" font-size="17" font-weight="700">GOVERNANCE</text>
  <text x="1160" y="284" fill="#5E665D" font-family="DejaVu Sans, Arial, sans-serif" font-size="17">Structured</text>
  <text x="1018" y="330" fill="#141715" font-family="DejaVu Sans, Arial, sans-serif" font-size="17" font-weight="700">CONTROL</text>
  <text x="1160" y="330" fill="#5E665D" font-family="DejaVu Sans, Arial, sans-serif" font-size="17">Inspectable</text>
  <rect x="1018" y="370" width="156" height="30" rx="15" fill="#EEF5F0"/>
