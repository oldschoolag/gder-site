      <stop stop-color="#FBF9F3"/>
      <stop offset="1" stop-color="#EDE6D9"/>
    </linearGradient>
  </defs>
  <rect width="1500" height="500" fill="url(#bg)"/>
  <rect x="26" y="26" width="1448" height="448" rx="28" stroke="#DED5C7"/>

  <rect x="84" y="74" width="72" height="72" rx="22" fill="#FFFDFC" stroke="#151816" stroke-width="3"/>
